services:
  server:
    image: ghcr.io/redpangilinan/crikket-server:latest
    pull_policy: always
    container_name: crikket-server
    restart: unless-stopped
    env_file:
      - ./apps/server/.env
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "${SERVER_PORT:-3000}:3000"
      - "${WEB_PORT:-3001}:3001"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  migrate:
    image: ghcr.io/redpangilinan/crikket-server:latest
    pull_policy: always
    restart: "no"
    env_file:
      - ./apps/server/.env
    environment:
      NODE_ENV: production
    command: ["bun", "run", "--filter", "@crikket/db", "db:migrate"]

  web:
    image: ghcr.io/redpangilinan/crikket-web:latest
    pull_policy: always
    container_name: crikket-web
    restart: unless-stopped
    env_file:
      - ./apps/web/.env
    depends_on:
      server:
        condition: service_healthy
    network_mode: "service:server"
    environment:
      NODE_ENV: production
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:3001').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
